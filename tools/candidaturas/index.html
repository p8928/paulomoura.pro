<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard de Candidaturas</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#080808" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="dashboard-brandbar">
        <a class="dashboard-brand" href="/" aria-label="Moura">
          <img src="/images/logo/main_logo_white.svg" alt="Moura" />
        </a>
        <p>Dashboard privado / candidaturas</p>
      </header>

      <section class="dashboard-hero">
        <div>
          <p>Triagem comercial</p>
          <h1>Candidaturas Brand-Driven.</h1>
        </div>
        <aside>
          <span data-source>Fonte: mock local</span>
          <strong data-total>0 candidaturas</strong>
          <small>Status e notas ficam salvos localmente em arquivo JSON.</small>
        </aside>
      </section>

      <section class="dashboard-controls" aria-label="Filtros de candidaturas">
        <label>
          <span>Buscar</span>
          <input data-search type="search" placeholder="Empresa, responsável, indústria ou motivo" />
        </label>
        <label>
          <span>Status</span>
          <select data-status-filter>
            <option value="">Todos</option>
            <option value="novo">Novo</option>
            <option value="avaliando">Avaliando</option>
            <option value="aprovado">Aprovado</option>
            <option value="recusado">Recusado</option>
            <option value="respondido">Respondido</option>
          </select>
        </label>
        <label>
          <span>Aderência</span>
          <select data-score-filter>
            <option value="">Todas</option>
            <option value="alta aderência">Alta aderência</option>
            <option value="avaliar">Avaliar</option>
            <option value="baixa aderência">Baixa aderência</option>
          </select>
        </label>
      </section>

      <section class="dashboard-grid">
        <div class="application-list" data-list aria-label="Lista de candidaturas"></div>

        <article class="application-detail" data-detail aria-live="polite">
          <p>Selecione uma candidatura</p>
          <h2>O detalhe aparecerá aqui.</h2>
          <span>Use a lista para avaliar contexto, orçamento, motivos e status.</span>
        </article>
      </section>
    </main>

    <script src="/main.js" type="module"></script>
  </body>
</html>
